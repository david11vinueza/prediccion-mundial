{% extends "base.html" %}
{% block contenido %}

<div class="contenedor">
    <h2>Registro de Participante</h2>

    <form method="POST" id="formRegistro">

        <input type="text" name="nombre" placeholder="Nombre" required>
        <input type="text" name="apellido" placeholder="Apellido" required>
        <input type="number" name="edad" placeholder="Edad" required>
        <input type="text" name="cedula" placeholder="Cédula (últimos 4)" required>
        <input type="text" name="celular" placeholder="Número de celular (WhatsApp)" required>

        <button type="button" id="btnContinuar">Continuar</button>
    </form>
</div>

<!-- ===========================
     MODAL DE CONFIRMACIÓN
     =========================== -->
<div id="modalReglamento" class="modal-overlay" style="
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.55);
    justify-content:center;
    align-items:center;
    z-index:9999;
">
    <div style="
        background:white;
        padding:25px;
        width:90%;
        max-width:380px;
        border-radius:10px;
        text-align:center;
    ">
        <h3>¿Leíste y estás de acuerdo con el reglamento?</h3>

        <button id="btnAceptar" style="
            background:#1a73e8;
            color:white;
            padding:12px;
            width:100%;
            border:none;
            border-radius:6px;
            margin-top:15px;
            font-size:16px;
        ">Sí, continuar</button>

        <button id="btnCerrar" style="
            background:#ccc;
            color:#333;
            padding:12px;
            width:100%;
            border:none;
            border-radius:6px;
            margin-top:10px;
            font-size:16px;
        ">Quiero leer</button>
    </div>
</div>

<script>
const btnContinuar = document.getElementById("btnContinuar");
const modal = document.getElementById("modalReglamento");
const btnCerrar = document.getElementById("btnCerrar");
const btnAceptar = document.getElementById("btnAceptar");
const form = document.getElementById("formRegistro");

btnContinuar.onclick = () => {
    modal.style.display = "flex";
};

btnCerrar.onclick = () => {
    modal.style.display = "none";
};

btnAceptar.onclick = () => {
    form.submit();
};
</script>

<!-- REGLAS -->
<div class="notas-container" style="
    margin-top: 30px;
    padding: 20px;
    background: #f4f8ff;
    border-left: 6px solid #1a73e8;
    border-radius: 8px;
    font-size: 15px;
    line-height: 1.5;
">
    <!-- (tu texto original aquí) -->
    {{ super() }}
</div>

{% endblock %}
